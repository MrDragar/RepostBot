services:
  broadcast-bot:
    build: .
    container_name: broadcast_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./temp:/app/temp          # для хранения файлов рассылки
      - ./logs:/app/logs          # опционально: логи
    environment:
      - TZ=Europe/Moscow
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge
